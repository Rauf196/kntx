# kntx example configuration
# copy to config.toml and edit for your environment

[forwarding]
# forwarding strategy: "userspace" (default), "vectored", or "splice" (linux-only, zero-copy)
strategy = "userspace"
# socket_buffer_size = 262144

[logging]
level = "info"

[metrics]
address = "0.0.0.0:9090"

# global health check defaults — each [[pools]] entry can override these
[health]
# check_interval_secs = 10   # active TCP probes (omit to disable globally)
failure_threshold = 3         # consecutive failures before circuit opens
recovery_timeout_secs = 10    # seconds in Open state before half-open probe

# access log — one structured line per completed request.
# default output is stdout, JSON format. uncomment to send elsewhere.
# [access_log]
# output = { file = "/var/log/kntx/access.log" }
# file_channel_capacity = 4096   # backpressure buffer for the file writer

# timeout reference (three distinct "idle" knobs at different scopes):
#
#   listener.idle_timeout_secs           — fallback for the four phase
#                                          timeouts below; legacy single-watchdog
#                                          knob, kept for compatibility.
#   listener.keepalive_idle_timeout_secs — max wait BETWEEN requests on a
#                                          kept-alive client connection.
#   pools.keepalive.idle_conn_ttl_secs   — how long an idle backend conn
#                                          stays in the cache before the
#                                          sweeper drops it.
#
# none of these overlap. set them per their scope.

# -------- listeners --------
# each listener binds one address and routes to a named pool.
# a listener uses EITHER `pool` (single pool) OR `[[listeners.routes]]` (routing table) — not both.

[[listeners]]
address = "0.0.0.0:8080"
mode = "l4"
pool = "web"
# max_connections = 10000
# idle_timeout_secs = 300
# drain_timeout_secs = 30
# connect_timeout_secs = 5
# max_connect_attempts = 3

# TLS listener — dotted keys + inline cert array keeps everything in one block.
# uncomment a `tls.certificates = [...]` line below to enable.
[[listeners]]
address = "0.0.0.0:8443"
mode = "l4"
pool = "api"
tls.handshake_timeout_secs = 5
tls.min_version = "1.2"   # "1.2" (default) or "1.3"

# single certificate:
# tls.certificates = [{ cert = "/path/to/fullchain.pem", key = "/path/to/privkey.pem" }]

# multiple certificates (SNI selection) — inline array spans lines, each entry stays one line:
# tls.certificates = [
#   { cert = "/path/api/fullchain.pem",   key = "/path/api/privkey.pem",   sni_names = ["api.example.com"] },
#   { cert = "/path/admin/fullchain.pem", key = "/path/admin/privkey.pem", sni_names = ["admin.example.com"] },
#   { cert = "/path/wildcard/fullchain.pem", key = "/path/wildcard/privkey.pem", sni_names = ["*.example.com"] },
# ]

# L7 listener with HTTP parsing, host/path routing, and the full keep-alive surface.
# routes are evaluated in declaration order — first match wins.
# there is no longest-match or specificity reordering; put more specific rules first.
#
# [[listeners]]
# address = "0.0.0.0:80"
# mode = "l7"
#
# request lifecycle caps (all optional; sensible defaults apply if omitted)
#
# client_header_timeout_secs = 60   # per-call read gap while receiving the request head
# client_body_timeout_secs   = 60   # per-call read gap while receiving the request body
# proxy_send_timeout_secs    = 60   # per-call write gap forwarding to the backend
# proxy_read_timeout_secs    = 60   # per-call read gap reading the backend response
# request_timeout_secs       = 60   # total deadline from head start to response complete
# max_body_size_bytes        = 1048576   # 1 MiB; 0 = unlimited (no body cap enforced)
# header_size_limit_bytes    = 16384     # header section size cap
#
# client-side keep-alive (HTTP/1.1 default-on, HTTP/1.0 opt-in via Connection: keep-alive)
#
# keepalive_idle_timeout_secs = 60       # max wait between requests on a kept-alive client conn
# keepalive_max_requests      = 1000     # close conn after this many sequential requests
#
# route api.example.com to the api pool
# [[listeners.routes]]
# host = "api.example.com"
# pool = "api"
#
# wildcard: *.example.com matches api.example.com AND a.b.example.com, but NOT example.com
# [[listeners.routes]]
# host = "*.example.com"
# pool = "web"
#
# path prefix: /admin/* must come BEFORE /  (or it will never be reached)
# [[listeners.routes]]
# path_prefix = "/admin"
# pool = "admin"
#
# catch-all: last route with no matchers handles everything else
# [[listeners.routes]]
# pool = "web"

# -------- pools --------
# each pool is one block: name, optional health override, backends list, optional keepalive cache config.

[[pools]]
name = "web"
backends = [
  { address = "127.0.0.1:3001" },
  { address = "127.0.0.1:3002" },
]
# keepalive cache uses defaults: max_idle=32, idle_conn_ttl_secs=60, max_total=0 (unlimited).

[[pools]]
name = "api"
# per-pool health override (merges with [health] defaults above)
health = { check_interval_secs = 5, failure_threshold = 2 }
backends = [
  { address = "127.0.0.1:4001" },
  { address = "127.0.0.1:4002" },
]
# backend keep-alive cache. each backend in the pool gets its own cache;
# the same backend address listed in two pools has two independent caches.
[pools.keepalive]
max_idle          = 32     # idle conns held per backend; 0 disables the cache entirely
idle_conn_ttl_secs = 60    # idle conn dropped from the cache after this many seconds
max_total          = 0     # cap on total conns (active + idle) per backend; 0 = unlimited
